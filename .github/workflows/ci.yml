name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check:ts-version
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - name: No external origins in built UI bundle
        run: |
          set -uo pipefail
          dist=apps/ui/dist
          if [ ! -d "$dist" ]; then
            echo "::error::$dist not found — did the UI build run?"
            exit 1
          fi
          # The CSP is the runtime control; this is a belt-and-suspenders
          # string scan of the shipped assets. Every http(s)/ws(s) origin must
          # be loopback or a known-safe, never-fetched string (XML/JSON-Schema
          # namespaces and dependency attribution/help URLs baked into vendor
          # code). Anything else fails the build.
          hits=$(grep -rhoE '(https?|wss?)://[a-zA-Z0-9._-]+' "$dist" \
            | sort -u \
            | grep -viE '://(127\.0\.0\.1|localhost|\[::1\]|(www\.)?w3\.org|json-schema\.org|reactflow\.dev|react\.dev|bit\.ly)$' \
            || true)
          if [ -n "$hits" ]; then
            echo "::error::Non-localhost origin(s) found in $dist:"
            echo "$hits"
            exit 1
          fi
          echo "OK: no external origins in $dist."

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: checks
    # flake guard — flip to blocking once stable
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm audit --omit=dev --audit-level=high
